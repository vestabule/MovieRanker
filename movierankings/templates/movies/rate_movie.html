{% extends "base.html" %}
{% block title %}Rate {{ movie.title }}{% endblock %}

{% block content %}
<h1>Rate “{{ movie.title }}”</h1>

<form method="post" style="margin-top: 1rem;">
    {% csrf_token %}

    <label for="score">Your rating (0–5, decimals allowed):</label><br>
    <input id="score" name="score" type="number" step="0.1" min="0" max="5"
        value="{% if latest_rating %}{{ latest_rating.rating }}{% endif %}" style="margin-top: 0.5rem;" />

    <br><br>
    <button type="submit">Save rating</button>

    {% if error %}
    <p style="color: red; margin-top: 1rem;">{{ error }}</p>
    {% endif %}
</form>

<p style="margin-top: 1rem;">
    <a href="{% url 'movie' movie.id %}">Back to movie</a>
</p>
{% endblock %}
``
