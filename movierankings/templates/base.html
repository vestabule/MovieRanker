<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{% block title %}My Demo{% endblock %}</title>
</head>

<body>
    <nav>
        <a href="{% url 'home' %}">Home</a> |
        {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:#06c;text-decoration:underline;cursor:pointer;">
                Log out
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Log in</a>
        {% endif %}
    </nav>
       
    {% block content %}
    {% endblock %}

</body>
</html>
