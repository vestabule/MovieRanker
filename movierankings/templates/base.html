<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{% block title %}My Movie App{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
        }

        .navbar {
            background: #222;
            color: white;
            padding: 1rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .content {
            padding: 2rem;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="{% url 'home' %}">Home</a>

        <a href="{% url 'movies' %}">Movies</a>

        {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:white;padding:0;margin:0;font:inherit;cursor:pointer;">
                Logout
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
